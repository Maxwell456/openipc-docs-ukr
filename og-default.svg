<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#3d6aff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#3d6aff" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f1a"/>
  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#3d6aff" opacity="0.6"/>

  <!-- Logo text -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="96" fill="white" letter-spacing="-2">OpenFPV</text>

  <!-- Separator -->
  <rect x="480" y="278" width="240" height="2" rx="1" fill="#3d6aff" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#a8a8c0" letter-spacing="0.5">Open platform for digital FPV systems based on OpenIPC</text>

  <!-- Bottom brand -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#3d6aff" opacity="0.7">openfpv.com.ua</text>
</svg>
