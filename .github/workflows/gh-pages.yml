name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log lastmod dates

      - name: Set Git author
        run: |
          git config --global user.name "Maxwell456"
          git config --global user.email "noreply@openfpv.com.ua"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable pip cache
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache/pip
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material[imaging] \
            mkdocs-glightbox \
            mkdocs-meta-descriptions-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-plugin \
            mkdocs-static-i18n

      - name: Deploy site to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gh-deploy builds internally into site/ and pushes to gh-pages branch.
        run: mkdocs gh-deploy --force --remote-name origin

      - name: Generate custom sitemaps
        # Runs after deploy so site/ exists with all built pages.
        # Produces: site/sitemap-ua.xml, site/en/sitemap.xml,
        #           site/sitemap_index.xml, site/sitemap.xml (index)
        run: python docs/build-scripts/generate_sitemap.py

      - name: Publish sitemaps to gh-pages branch
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          # UA sitemap
          cp site/sitemap-ua.xml sitemap-ua.xml
          # EN sitemap
          mkdir -p en
          cp site/en/sitemap.xml en/sitemap.xml
          # Sitemap index (overwrites MkDocs-generated sitemap.xml)
          cp site/sitemap_index.xml sitemap_index.xml
          cp site/sitemap.xml sitemap.xml
          git add sitemap-ua.xml en/sitemap.xml sitemap_index.xml sitemap.xml
          git diff --staged --quiet || git commit -m "ci: update sitemaps [skip ci]"
          git push origin gh-pages
