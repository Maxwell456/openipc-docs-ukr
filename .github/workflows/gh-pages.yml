name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log lastmod dates

      - name: Set Git author
        run: |
          git config --global user.name "Maxwell456"
          git config --global user.email "noreply@openfpv.com.ua"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable pip cache
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache/pip
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material[imaging] \
            mkdocs-glightbox \
            mkdocs-meta-descriptions-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-plugin \
            mkdocs-static-i18n

      - name: Build site
        # Build into site/ without deploying yet.
        run: mkdocs build

      - name: Generate custom sitemaps
        # Adds sitemap-ua.xml, en/sitemap.xml, sitemap_index.xml, sitemap.xml
        # directly into site/ before the single deploy step.
        run: python docs/build-scripts/generate_sitemap.py

      - name: Deploy to GitHub Pages (single push)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # ghp-import is installed with mkdocs-material.
        # One push → one "pages build and deployment" run (no duplicates).
        run: |
          ghp-import site/ \
            --force \
            --push \
            --branch gh-pages \
            --message "ci: deploy [skip ci]"
