name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needs write access to push the built site to the gh-pages branch
permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run build

      # Publish the built site to the gh-pages branch (same serving model as the
      # old MkDocs site: Pages Source stays "Deploy from a branch: gh-pages").
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          cname: openfpv.com.ua
